jobs:
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: wildx-backend/package-lock.json

      - name: Install dependencies
        working-directory: wildx-backend
        run: npm install

      - name: Check syntax (lint)
        working-directory: wildx-backend
        run: node --check server.js

      - name: Verify dependencies resolve
        working-directory: wildx-backend
        run: node -e "require('express'); require('dotenv'); require('cors'); console.log('✅ Dependencies OK');"

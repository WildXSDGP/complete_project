name: WildX CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── CI: Test ──────────────────────────────────────────────────
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: wildx-backend/package-lock.json

      - name: Install dependencies
        working-directory: wildx-backend
        run: npm install

      - name: Start server (smoke test)
        working-directory: wildx-backend
        run: node -e "require('./server.js')" &
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
          PORT: 3000

      - name: Health check
        run: |
          sleep 3
          curl -f http://localhost:3000/health || exit 1

  # ── CD: Deploy to Railway ─────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: wildx-backend
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
```

---

## What Changed from Render

The `deploy` job is different — instead of a simple `curl` webhook, it:
1. Checks out the code
2. Installs the Railway CLI
3. Runs `railway up --detach` to push & deploy

---

## Add the Railway Secret

Go to your repo → **Settings → Secrets and variables → Actions → New repository secret**:

| Secret Name | Value |
|---|---|
| `RAILWAY_TOKEN` | Your Railway API token (see below) |
| `DATABASE_URL` | Your DB connection string |
| `JWT_SECRET` | Your JWT secret |

**How to get your `RAILWAY_TOKEN`:**
1. Go to [railway.app](https://railway.app) → click your profile (top right)
2. **Account Settings → Tokens**
3. Click **"New Token"**, give it a name like `github-actions`
4. Copy the token → paste it as the secret

---

## Flow Summary
```
Push to main
     │
     ▼
  [test] — npm install → start server → curl /health
     │
     │  ✅ passes
     ▼
  [deploy] — railway up → Railway pulls & redeploys wildx-backend

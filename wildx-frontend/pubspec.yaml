name: wildx_frontend
description: "WildX - Sri Lanka Wildlife Explorer App"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase - compatible set
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  # Other
  http: ^1.6.0
  cached_network_image: ^3.3.1
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  intl: ^0.19.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/NationalParkImages/
    - assets/icons/
